<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard</title>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">每日總經與台美股跨市場連動歸因看板</h1>
        
        <div class="flex gap-4 mb-6">
            <button onclick="update('us')" class="bg-white px-4 py-2 rounded shadow">美股總經</button>
            <button onclick="update('web3')" class="bg-white px-4 py-2 rounded shadow">Web3 RWA</button>
            <button onclick="update('tw')" class="bg-white px-4 py-2 rounded shadow">台股動態</button>
        </div>

        <div id="card" class="bg-white p-8 rounded-xl shadow-lg border-l-4 border-indigo-500">
            <h2 id="title" class="text-2xl font-bold mb-4">請點擊上方頁籤</h2>
            <p id="desc" class="text-slate-600">等待資料載入...</p>
        </div>
    </div>

    <script>
        const content = {
            us: { t: "Fed 紀要釋放訊號", d: "核心通膨黏性導致殖利率飆升，權值股壓力增大。" },
            web3: { t: "Web3 資金流動正常", d: "鏈上 RWA 資產流入健康，流動性穩定。" },
            tw: { t: "台股技術面支撐", d: "供應鏈效應擴散，電子零組件表現穩健。" }
        };

        function update(key) {
            document.getElementById('title').innerText = content[key].t;
            document.getElementById('desc').innerText = content[key].d;
        }
    </script>
</body>
</html>
