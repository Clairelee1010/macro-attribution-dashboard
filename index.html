<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日總經與台美股跨市場連動歸因看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dashboard-card { background: #1e293b; border-radius: 8px; padding: 1.5rem; color: white; }
    </style>
</head>
<body class="bg-slate-900 text-white p-8">

    <header class="mb-8">
        <h1 class="text-3xl font-bold">每日總經與台美股跨市場連動歸因看板 <span class="text-sm text-slate-400">v4.0 旗艦版</span></h1>
    </header>

    <div class="flex space-x-4 mb-6">
        <button id="tab-us" onclick="switchTab('us')" class="px-4 py-2 border-b-2 text-indigo-400 border-indigo-400">美股總經</button>
        <button id="tab-web3" onclick="switchTab('web3')" class="px-4 py-2 border-b-2 text-slate-400 hover:text-white">Web3 RWA</button>
        <button id="tab-tw" onclick="switchTab('tw')" class="px-4 py-2 border-b-2 text-slate-400 hover:text-white">台股動態</button>
    </div>

    <div id="news-container"></div>

    <script>
        // 1. 資料庫
        const marketData = {
            us: [
                {
                    title_zh: "Fed 紀要釋放 'Higher for Longer' 訊號，黏性通膨扭曲殖利率曲線",
                    source: "Reuters / FOMC Minutes",
                    macro_attribution_zh: "聯準會會議紀要釋放強烈鷹派訊號，核心通膨具有黏性，導致殖利率再度飆升。",
                    tw_spillover_effect_zh: "台美利差維持高位，引發對台股權值股的階段性提款壓力。"
                }
            ],
            web3: [
                {
                    title_zh: "Web3 資金流動正常",
                    source: "Agentic Finance",
                    macro_attribution_zh: "鏈上流動性指標穩定，RWA 資產流入健康。",
                    tw_spillover_effect_zh: "無顯著溢出效應。"
                }
            ],
            tw: [
                {
                    title_zh: "台股經濟部快訊",
                    source: "Market Watch",
                    macro_attribution_zh: "台股技術面支撐強勁。",
                    tw_spillover_effect_zh: "供應鏈效應擴散中。"
                }
            ]
        };

        let activeTab = 'us';

        // 2. 渲染邏輯
        function renderActiveTab() {
            const container = document.getElementById('news-container');
            container.innerHTML = ""; 

            const data = marketData[activeTab];
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "dashboard-card mb-6";
                card.innerHTML = `
                    <h3 class="text-xl font-bold mb-2">${item.title_zh}</h3>
                    <p class="text-sm text-slate-400 mb-4">${item.source}</p>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div><h4 class="font-bold text-indigo-400">總經歸因</h4><p>${item.macro_attribution_zh}</p></div>
                        <div><h4 class="font-bold text-indigo-400">台股溢出影響</h4><p>${item.tw_spillover_effect_zh}</p></div>
                    </div>
                `;
                container.appendChild(card);
            });

            // 更新按鈕狀態
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('text-indigo-400', 'border-indigo-400'));
            document.getElementById('tab-' + activeTab).classList.add('text-indigo-400', 'border-indigo-400');
        }

        // 3. 切換邏輯
        function switchTab(tab) {
            activeTab = tab;
            renderActiveTab();
        }

        // 初始化
        renderActiveTab();
    </script>
</body>
</html>
