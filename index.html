<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">🎯 每日總經與台美股跨市場連動歸因看板</h1>
        <div id="stats" class="grid grid-cols-4 gap-4 mb-8"></div>
        <div id="news-container" class="space-y-6"></div>
    </div>

    <script>
        async function loadDashboard() {
            const res = await fetch('market_data.json');
            const data = await res.json();
            
            // 渲染指標
            document.getElementById('stats').innerHTML = `
                <div class="bg-white p-4 shadow rounded">VIX: ${data.vix}</div>
                <div class="bg-white p-4 shadow rounded">RWA: ${data.rwa_flow}</div>
            `;
            
            // 渲染新聞 (包含推薦與風險)
            const container = document.getElementById('news-container');
            container.innerHTML = data.news.map(item => `
                <div class="bg-white p-8 border-l-4 border-indigo-600 shadow-sm rounded-xl">
                    <h2 class="text-2xl font-bold mb-4">${item.title}</h2>
                    <div class="grid grid-cols-2 gap-8 text-sm">
                        <div><p class="font-bold text-indigo-600 uppercase text-xs">總經歸因</p>${item.macro}</div>
                        <div><p class="font-bold text-slate-500 uppercase text-xs">台股溢出影響</p>${item.spill}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div class="bg-green-50 p-3 rounded text-xs"><strong>推薦：</strong> ${item.recommend.map(g => g.name).join(', ')}</div>
                        <div class="bg-red-50 p-3 rounded text-xs"><strong>風險：</strong> ${item.risk.map(g => g.name).join(', ')}</div>
                    </div>
                </div>
            `).join('');
        }
        loadDashboard();
    </script>
</body>
</html>
