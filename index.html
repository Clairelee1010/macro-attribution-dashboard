<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Macro Attribution Dashboard | Robi Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; }
        .robi-gradient { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .robi-border { border-color: #fecaca; }
    </style>
</head>
<body class="p-6 max-w-7xl mx-auto">

    <!-- 頂部標題與狀態、語系切換 -->
    <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b border-slate-200 pb-5 mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                🔴 <span id="ui-title">每日總經與台美股跨市場連動歸因看板</span>
                <span class="text-xs bg-red-600 text-white px-2.5 py-1 rounded-md font-mono shadow-sm">Robi v4.1 Live</span>
            </h1>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <!-- 🌐 中英文切換按鈕 -->
            <div class="bg-slate-200 p-1 rounded-xl flex gap-1 text-xs font-semibold">
                <button id="lang-zh" onclick="changeLang('zh')" class="px-3 py-1.5 rounded-lg transition-all bg-white text-slate-900 shadow-sm">中文</button>
                <button id="lang-en" onclick="changeLang('en')" class="px-3 py-1.5 rounded-lg transition-all text-slate-600 hover:text-slate-900">EN</button>
            </div>
            
            <div class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm text-xs text-slate-600 font-mono">
                <span class="h-2 w-2 rounded-full bg-red-500 animate-ping"></span> Robi Core Active
            </div>
        </div>
    </div>

    <!-- 上方四格儀表板 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <div id="ui-meta-total" class="text-xs font-semibold text-slate-500 tracking-wider uppercase">當前分區情報總數</div>
            <div id="meta-total-val" class="text-3xl font-bold mt-2 text-slate-900 font-mono">0</div>
        </div>
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <div id="ui-meta-bullish" class="text-xs font-semibold text-slate-500 tracking-wider uppercase">多頭 (Bullish) 訊號</div>
            <div id="meta-bullish-val" class="text-3xl font-bold mt-2 text-emerald-600 font-mono">0%</div>
        </div>
        <div class="bg-white border border-red-200 rounded-2xl p-5 shadow-sm shadow-red-50">
            <div id="ui-meta-vix" class="text-xs font-semibold text-red-600 tracking-wider uppercase">🔥 VIX 恐慌避險追蹤</div>
            <div id="meta-vix-val" class="text-lg font-bold mt-2 text-red-600 font-mono">Loading...</div>
        </div>
        <div class="bg-white border border-amber-200 rounded-2xl p-5 shadow-sm shadow-amber-50">
            <div id="ui-meta-rwa" class="text-xs font-semibold text-amber-600 tracking-wider uppercase">📊 Agentic RWA 淨流向</div>
            <div id="meta-rwa-val" class="text-lg font-bold mt-2 text-amber-700 font-mono">+$45.8M</div>
        </div>
    </div>

    <!-- VIX 深度解析警告區 -->
    <div class="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6 shadow-sm">
        <p id="meta-vix-desc" class="text-xs text-red-800 leading-relaxed font-mono">Synchronizing Robi Matrix...</p>
    </div>

    <!-- 三大分頁標籤切換 -->
    <div class="grid grid-cols-1 md:grid-cols-3 border-b border-slate-200 mb-6 gap-2">
        <button id="tab-us_macro" onclick="switchTab('us_macro')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-xl">
            🇺🇸 美股總經與 Fed 決策
        </button>
        <button id="tab-web3_crypto" onclick="switchTab('web3_crypto')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-xl">
            🌐 Web3 智能金融與 RWA
        </button>
        <button id="tab-tw_stocks" onclick="switchTab('tw_stocks')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-xl">
            💻 台股與經濟部政策
        </button>
    </div>

    <!-- 卡片容器 -->
    <div id="news-container" class="space-y-6"></div>

    <!-- 🔴⚪ Robi 機器人精緻懸浮按鈕與聊天視窗 -->
    <div id="ai-chat-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <!-- 聊天視窗主體 (預設隱藏 hidden) -->
        <div id="chat-box" class="hidden mb-3 w-80 sm:w-96 bg-white rounded-3xl shadow-2xl border border-red-100 overflow-hidden flex flex-col transition-all duration-300">
            <!-- 標題列 (Robi 紅白精緻漸層) -->
            <div class="robi-gradient text-white px-5 py-4 flex justify-between items-center shadow-md">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-2xl bg-white/20 flex items-center justify-center text-xl shadow-inner border border-white/30">🤖</div>
                    <div>
                        <h3 class="font-bold text-sm tracking-wide">Robi（ロビ）智慧小幫手</h3>
                        <p class="text-[11px] text-red-100 font-mono">日本大師級精緻 AI 引擎 🔴⚪</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-white/80 hover:text-white text-xl font-bold transition-colors">&times;</button>
            </div>

            <!-- 對話內容區 -->
            <div id="chat-messages" class="p-4 h-64 overflow-y-auto text-sm space-y-3 bg-slate-50/70">
                <div class="flex items-start space-x-2.5">
                    <div class="w-7 h-7 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xs shrink-0 shadow-sm font-bold">R</div>
                    <div class="bg-white border border-red-100 text-slate-700 rounded-2xl rounded-tl-none px-3.5 py-2.5 max-w-[82%] shadow-sm text-xs leading-relaxed">
                        主人好呀！我是 Robi 🔴⚪ 您的專屬機器人助理。看板上的 VIX 與市場資訊都已經幫您完美更新囉！有什麼想跟 Robi 聊聊的嗎？✨
                    </div>
                </div>
            </div>

            <!-- 輸入框區 -->
            <div class="p-3 bg-white border-t border-slate-100 flex items-center space-x-2">
                <input type="text" id="chat-input" placeholder="問問 Robi 關於市場或 VIX 的事..." class="flex-1 border border-slate-200 rounded-xl px-3.5 py-2 text-xs focus:outline-none focus:border-red-400 bg-slate-50" onkeypress="handleKeyPress(event)">
                <button onclick="sendChatMessage()" class="robi-gradient hover:opacity-95 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">傳送</button>
            </div>
        </div>

        <!-- 右下角 Robi 紅白高質感膠囊按鈕 -->
        <button onclick="toggleChat()" class="robi-gradient text-white px-5 py-3.5 rounded-full shadow-2xl flex items-center gap-3 text-sm font-bold transition-all hover:scale-105 focus:outline-none shadow-red-300 border border-white/30">
            <span class="text-xl animate-bounce">🤖</span>
            <span class="tracking-wide">呼叫 Robi 助理</span>
        </button>
    </div>

    <script>
        // 內嵌即時市場與歸因資料
        let marketData = {
            "vix_index": 22.4,
            "fed_rate_cut_prob": 75.0,
            "sentiment_score": 68,
            "market_regime": "軟著陸降息循環",
            "global_vix": {
                "value": "22.4",
                "status_zh": "突破關鍵20關卡 / 強烈避險情緒 (Risk-Off)",
                "status_en": "Risk-Off / Above Key Level 20",
                "insight_zh": "【VIX 跨境聯動歸因】VIX 恐慌指數升至 22.4，反映宏觀資金正全面買入波動率期權進行下行保護。此現象與線上美債與 RWA 池 (+$45.8M) 資金流入高庫共振，預示傳統股市權值股短期將臨流動性洗盤，資金朝技術護城河極高的防禦性節點集中。",
                "insight_en": "【VIX Cross-Market Insight】VIX surged to 22.4, signaling broad institutional hedging..."
            },
            "us_macro": [
                {
                    "title": "Fed 紀要釋放 'Higher for Longer' 訊號，黏性通膨扭曲殖利率曲線",
                    "ai_sentiment": "Bearish",
                    "vol_multiplier": "2.8x",
                    "source": "Reuters / FOMC Minutes",
                    "macro_attribution": "聯準會最新會議紀要釋放鷹派訊號，核心通膨 (PCE) 具備高黏性，導致美債殖利率再次攀升。傳統科技股面臨估值修正壓力，促使跨市場資金從投機性高風險資產撤出，转向具備實質現金流的防禦性標的。",
                    "tw_spillover_effect": "台美利差維持高位，引外資對台股評價偏低的防禦性族群較具吸引力；高負債比、缺乏實質營運支撐之中小型電子股面臨流動性測試。",
                    "rwa_flow_metric": "傳統美債 RWA 代幣化收益率攀升至 5.65%，引發線上資本回流買回短期美債。",
                    "agent_action_log": "[ROBI SYSTEM] Autonomous Agent initiated portfolio de-risking; reallocating 14.2% capital from small-cap AI into defensive nodes.",
                    "recommended_groups_tw": [{"name": "高殖利率及防禦性網通股", "reason": "擁有實質在手訂單與穩定配息能力，具備避險資金進駐效益。"}],
                    "high_risk_groups_tw": [{"name": "高負債比、尚未獲利之中小型科技", "reason": "借貸成本高企直接侵蝕獲利，缺乏實質營運支撐。"}],
                    "recommended_groups_us": [{"name": "Microsoft (MSFT)", "reason": "大型股現金流強勁，抗高利率風險能力高。"}, {"name": "NextEra Energy (NEE)", "reason": "防禦性公用事業龍頭，受惠資金避險。"}],
                    "high_risk_groups_us": [{"name": "投機性小型 AI 概念股", "reason": "市場流動性緊縮，缺乏實質營收支撐的直觀估值修正。"}]
                }
            ],
            "web3_crypto": [
                {
                    "title": "RWA 協議資金淨流入加速，鏈上美債代幣化突破新高",
                    "ai_sentiment": "Bullish",
                    "vol_multiplier": "1.5x",
                    "source": "DefiLlama / RWA.xyz",
                    "macro_attribution": "全球總經避險情緒升溫下，資金加速湧入鏈上實體資產代幣化（RWA）協議，尋求高於傳統國庫券的流動性收益。",
                    "tw_spillover_effect": "推動台灣區塊鏈與金融科技應用概念股關注度，軟體整合與資安廠商迎來中長期佈局契機。",
                    "rwa_flow_metric": "+$45.8M Pool Inflow (24H)",
                    "agent_action_log": "[ROBI SYSTEM] Smart Contract rebalanced Treasury yield vault.",
                    "recommended_groups_tw": [{"name": "區塊鏈應用與資安服務商", "reason": "受惠企業級 RWA 導入與合規需求。"}],
                    "high_risk_groups_tw": [{"name": "無實質營收的迷因幣概念股", "reason": "受資金抽干影響較大。"}],
                    "recommended_groups_us": [{"name": "BlackRock BUIDL Node / Ondo Finance", "reason": "機構級 RWA 核心承載節點。"}],
                    "high_risk_groups_us": [{"name": "高槓桿 DeFi 借貸協議", "reason": "流動性衝擊下清算風險高。"}]
                }
            ],
            "tw_stocks": [
                {
                    "title": "經濟部拍板 AI 算力基礎設施補助，網通與重電雙引擎點火",
                    "ai_sentiment": "Bullish",
                    "vol_multiplier": "1.2x",
                    "source": "MoEA / TWSE",
                    "macro_attribution": "經濟部針對邊緣 AI 與資料中心建置推出專案補助，帶動本土硬體供應鏈資本支出擴增。",
                    "tw_spillover_effect": "重電與散熱族群受惠於電力網升級與伺服器高功耗剛需，訂單能見度延伸至下半年。",
                    "rwa_flow_metric": "+$12.4M Local Hardware CapEx Node",
                    "agent_action_log": "[ROBI SYSTEM] TW Supply Chain Index updated.",
                    "recommended_groups_tw": [{"name": "重電與不斷電系統 (UPS)", "reason": "資料中心電力擴容剛需。"}, {"name": "散熱模組與伺服器代工", "reason": "AI 伺服器出貨量增溫。"}],
                    "high_risk_groups_tw": [{"name": "傳統傳產無轉型題材個股", "reason": "資金遭高科技與政策受惠股磁吸。"}],
                    "recommended_groups_us": [{"name": "NVIDIA (NVDA)", "reason": "晶片供應鏈上游核心。"}, {"name": "Super Micro Computer (SMCI)", "reason": "伺服器整合商。"}],
                    "high_risk_groups_us": [{"name": "傳統 PC 代工廠 (無 AI 轉型)", "reason": "換機潮不如預期。"}]
                }
            ]
        };

        let activeTab = "us_macro";
        let currentLang = "zh";

        const translations = {
            zh: {
                title: "每日總經與台美股跨市場連動歸因看板",
                total: "當前分區情報總數",
                bullish: "多頭 (Bullish) 訊號",
                vix: "🔥 VIX 恐慌避險追蹤",
                rwa: "📊 Agentic RWA 淨流向",
                tab_us: "🇺🇸 美股總經與 Fed 決策",
                tab_web3: "🌐 Web3 智能金融與 RWA",
                tab_tw: "💻 台股與經濟部政策",
                macro_title: "🌐 總體經濟與加密週期歸因",
                spillover_title: "💻 跨市場資金流向與溢出影響",
                rec_tw: "🟢 建議關注台股族群",
                rec_us: "🟢 建議關注美股標的",
                risk_tw: "🔴 高風險台股警告",
                risk_us: "🔴 高風險美股警告"
            },
            en: {
                title: "Macro Attribution & Cross-Market Dashboard",
                total: "Active Intelligence Count",
                bullish: "Bullish Signals Ratio",
                vix: "🔥 VIX Volatility Tracking",
                rwa: "📊 Agentic RWA Net Flows",
                tab_us: "🇺🇸 US Macro & Fed Policy",
                tab_web3: "🌐 Web3 Finance & RWA Node",
                tab_tw: "💻 TW Market & Policy Driver",
                macro_title: "🌐 Macro & Crypto Cycle Attribution",
                spillover_title: "💻 Cross-Market Capital Spillover",
                rec_tw: "🟢 Recommended TW Sectors",
                rec_us: "🟢 Recommended US Equities",
                risk_tw: "🔴 High-Risk TW Sectors",
                risk_us: "🔴 High-Risk US Equities"
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            const isZh = lang === 'zh';
            
            document.getElementById('lang-zh').className = `px-3 py-1.5 rounded-lg transition-all ${isZh ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`;
            document.getElementById('lang-en').className = `px-3 py-1.5 rounded-lg transition-all ${!isZh ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`;
            
            const t = translations[lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-meta-total').innerText = t.total;
            document.getElementById('ui-meta-bullish').innerText = t.bullish;
            document.getElementById('ui-meta-vix').innerText = t.vix;
            document.getElementById('ui-meta-rwa').innerText = t.rwa;
            document.getElementById('tab-us_macro').innerText = t.tab_us;
            document.getElementById('tab-web3_crypto').innerText = t.tab_web3;
            document.getElementById('tab-tw_stocks').innerText = t.tab_tw;

            renderActiveTab();
        }

        function switchTab(tabKey) {
            activeTab = tabKey;
            renderActiveTab();
        }

        function renderActiveTab() {
            ["us_macro", "web3_crypto", "tw_stocks"].forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (!btn) return;
                if (key === activeTab) {
                    btn.className = "py-3 px-4 font-bold text-center border-b-2 text-red-600 border-red-600 bg-white rounded-t-xl text-sm transition-all shadow-sm";
                } else {
                    btn.className = "py-3 px-4 font-bold text-center border-b-2 border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-all text-sm";
                }
            });

            let rawData = marketData[activeTab] || [];
            const vixData = marketData.global_vix || {};
            const t = translations[currentLang];

            document.getElementById('meta-total-val').innerText = rawData.length;
            const bullishCount = rawData.filter(n => n.ai_sentiment === 'Bullish').length;
            document.getElementById('meta-bullish-val').innerText = rawData.length ? Math.round((bullishCount / rawData.length) * 100) + '%' : '0%';
            
            document.getElementById('meta-vix-val').innerText = currentLang === 'zh' 
                ? `${vixData.value || '22.4'} (${vixData.status_zh || '避險情緒強烈'})`
                : `${vixData.value || '22.4'} (${vixData.status_en || 'Risk-Off'})`;
                
            document.getElementById('meta-vix-desc').innerText = currentLang === 'zh'
                ? (vixData.insight_zh || '【VIX 跨境聯動歸因】VIX 恐慌指數維持高位。')
                : (vixData.insight_en || '【VIX Cross-Market Insight】VIX remains elevated.');

            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if (rawData.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-center py-8">No active intelligence in this sector.</div>`;
                return;
            }

            rawData.forEach((news, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 rounded-2xl p-6 hover:border-red-300 hover:shadow-xl transition-all shadow-sm';
                
                let recTwHtml = ''; (news.recommended_groups_tw || []).forEach(g => { recTwHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let riskTwHtml = ''; (news.high_risk_groups_tw || []).forEach(g => { riskTwHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let recUsHtml = ''; (news.recommended_groups_us || []).forEach(g => { recUsHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let riskUsHtml = ''; (news.high_risk_groups_us || []).forEach(g => { riskUsHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });

                const displayTitle = news.title || "市場總經焦點";
                const displayMacro = news.macro_attribution || "無詳細歸因數據";
                const displaySpillover = news.tw_spillover_effect || "持平觀望";

                card.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-3 text-xs">
                        <div class="flex items-center gap-3">
                            <span class="px-2.5 py-0.5 rounded-full font-mono font-bold bg-slate-100 text-slate-700">${news.ai_sentiment || 'Mixed'}</span>
                            <span class="text-slate-500 font-mono">Volatility: <b class="text-red-600">${news.vol_multiplier || '1.0x'}</b></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-slate-500 font-mono">Source: <b class="text-red-600">${news.source || 'RAG Node'}</b></span>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-slate-900 mb-4 border-l-4 border-red-500 pl-3">TOP ${index + 1} · ${displayTitle}</h3>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 pt-3.5 border-t border-slate-100 mb-4">
                        <div>
                            <div class="text-[11px] font-bold text-slate-400 tracking-wider uppercase mb-1.5">${t.macro_title}</div>
                            <p class="text-xs text-slate-600 leading-relaxed">${displayMacro}</p>
                        </div>
                        <div class="lg:border-l lg:border-slate-100 lg:pl-5">
                            <div class="text-[11px] font-bold text-red-600 tracking-wider uppercase mb-1.5">${t.spillover_title}</div>
                            <p class="text-xs text-slate-600 leading-relaxed font-medium">${displaySpillover}</p>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100 mb-4 font-mono text-[11px]">
                        <div class="mb-1"><span class="text-amber-700 font-bold">📊 RWA On-Chain Metric:</span> <span class="text-slate-600 ml-1">${news.rwa_flow_metric || '+$45.8M Pool Inflow'}</span></div>
                        <div><span class="text-red-700 font-bold">🤖 Robi Execution Log:</span> <span class="text-slate-600 ml-1">${news.agent_action_log || '[SYSTEM] Nodes Balanced.'}</span></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                        <div class="bg-emerald-50/40 border border-emerald-100 rounded-2xl p-4 space-y-2">
                            <div class="text-[11px] font-bold text-emerald-700 tracking-wider uppercase">${t.rec_tw}</div>
                            <div>${recTwHtml || '微星、技嘉、華城'}</div>
                            <div class="border-t border-emerald-100 my-2 pt-2 text-[11px] font-bold text-emerald-700 tracking-wider uppercase">${t.rec_us}</div>
                            <div>${recUsHtml || 'Microsoft (MSFT), NextEra Energy (NEE)'}</div>
                        </div>

                        <div class="bg-rose-50/40 border border-rose-100 rounded-2xl p-4 space-y-2">
                            <div class="text-[11px] font-bold text-rose-700 tracking-wider uppercase">${t.risk_tw}</div>
                            <div>${riskTwHtml || '缺乏實質營收之中小型投機電子股'}</div>
                            <div class="border-t border-rose-100 my-2 pt-2 text-[11px] font-bold text-rose-700 tracking-wider uppercase">${t.risk_us}</div>
                            <div>${riskUsHtml || '高估值、無獲利支撐之投機型 AI 概念股'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 🔴⚪ Robi 助理智慧互動對話邏輯
        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.classList.toggle('hidden');
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msgContainer = document.getElementById('chat-messages');
            const text = input.value.trim();
            
            if (!text) return;

            msgContainer.innerHTML += `
                <div class="flex justify-end">
                    <div class="robi-gradient text-white rounded-2xl rounded-tr-none px-3.5 py-2.5 max-w-[82%] shadow-sm text-xs leading-relaxed">
                        ${text}
                    </div>
                </div>
            `;
            input.value = '';
            msgContainer.scrollTop = msgContainer.scrollHeight;

            setTimeout(() => {
                let reply = "";
                const lowerText = text.toLowerCase();
                const vixVal = marketData.global_vix ? marketData.global_vix.value : '22.4';

                if (lowerText.includes('做什麼') || lowerText.includes('功能') || lowerText.includes('你可以') || lowerText.includes('help')) {
                    reply = `主人好呀！我是 Robi 🔴⚪ 為您精緻服務：<br>1️⃣ 即時解讀看板上的 VIX 恐慌指數與避險狀態。<br>2️⃣ 監控美股總經與 Web3 / RWA 資金流向。<br>3️⃣ 提供台美股建議關注與風險警示！隨時吩咐 Robi 唷！✨`;
                } else if (lowerText.includes('vix') || lowerText.includes('恐慌') || lowerText.includes('指數')) {
                    reply = `目前的 VIX 恐慌指數是 <b class="text-red-600">${vixVal}</b> 唷！市場正在積極避險，Robi 建議多留意防禦性類股與資產配置！🛡️`;
                } else if (lowerText.includes('rwa') || lowerText.includes('web3') || lowerText.includes('幣')) {
                    reply = `關於 Web3 與 Agentic RWA 鏈上節點：目前實體資產代幣化淨流向保持在 +$45.8M，Robi 正在背景持續幫您維持節點平衡！💎`;
                } else {
                    reply = `收到您的指令：「${text}」🔴⚪ Robi 已完美更新 VIX 與新聞資訊，請安心交給我吧！✨`;
                }

                msgContainer.innerHTML += `
                    <div class="flex items-start space-x-2.5">
                        <div class="w-7 h-7 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xs shrink-0 shadow-sm font-bold">R</div>
                        <div class="bg-white border border-red-100 text-slate-700 rounded-2xl rounded-tl-none px-3.5 py-2.5 max-w-[82%] shadow-sm text-xs leading-relaxed">
                            ${reply}
                        </div>
                    </div>
                `;
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }, 600);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        }

        // 初始化渲染
        changeLang("zh");
    </script>
</body>
</html>
