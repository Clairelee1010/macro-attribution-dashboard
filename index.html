<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Macro Attribution Dashboard 4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #334155; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="p-6 max-w-7xl mx-auto">

    <!-- 頂部標題與狀態、語系切換 -->
    <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b border-slate-200 pb-5 mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                🎯 <span id="ui-title">每日總經與台美股跨市場連動歸因看板</span>
                <span class="text-xs bg-indigo-600 text-indigo-50 px-2.5 py-1 rounded-md font-mono">v4.0 Live</span>
            </h1>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <!-- 🌐 中英文切換按鈕 -->
            <div class="bg-slate-200 p-1 rounded-xl flex gap-1 text-xs font-semibold">
                <button id="lang-zh" onclick="changeLang('zh')" class="px-3 py-1.5 rounded-lg transition-all bg-white text-slate-900 shadow-sm">中文</button>
                <button id="lang-en" onclick="changeLang('en')" class="px-3 py-1.5 rounded-lg transition-all text-slate-600 hover:text-slate-900">EN</button>
            </div>
            
            <div class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm text-xs text-slate-600 font-mono">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span> Data Live Sync
            </div>
        </div>
    </div>

    <!-- 上方四格儀表板 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <div id="ui-meta-total" class="text-xs font-semibold text-slate-500 tracking-wider uppercase">當前分區情報總數</div>
            <div id="meta-total-val" class="text-3xl font-bold mt-2 text-slate-900 font-mono">0</div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <div id="ui-meta-bullish" class="text-xs font-semibold text-slate-500 tracking-wider uppercase">多頭 (Bullish) 訊號</div>
            <div id="meta-bullish-val" class="text-3xl font-bold mt-2 text-emerald-600 font-mono">0%</div>
        </div>
        <div class="bg-white border border-red-200 rounded-xl p-5 shadow-sm shadow-red-100">
            <div id="ui-meta-vix" class="text-xs font-semibold text-red-600 tracking-wider uppercase">🔥 VIX 恐慌避險追蹤</div>
            <div id="meta-vix-val" class="text-lg font-bold mt-2 text-red-600 font-mono">Loading...</div>
        </div>
        <div class="bg-white border border-amber-200 rounded-xl p-5 shadow-sm shadow-amber-100">
            <div id="ui-meta-rwa" class="text-xs font-semibold text-amber-600 tracking-wider uppercase">📊 Agentic RWA 淨流向</div>
            <div id="meta-rwa-val" class="text-lg font-bold mt-2 text-amber-700 font-mono">+$45.8M</div>
        </div>
    </div>

    <!-- VIX 深度解析警告區 -->
    <div class="bg-red-50 border border-red-100 rounded-xl p-4 mb-6">
        <p id="meta-vix-desc" class="text-xs text-red-800 leading-relaxed font-mono">Synchronizing Matrix...</p>
    </div>

    <!-- 三大分頁標籤切換 -->
    <div class="grid grid-cols-1 md:grid-cols-3 border-b border-slate-200 mb-6 gap-2">
        <button id="tab-us_macro" onclick="switchTab('us_macro')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-lg">
            🇺🇸 美股總經與 Fed 決策
        </button>
        <button id="tab-web3_crypto" onclick="switchTab('web3_crypto')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-lg">
            🌐 Web3 智能金融與 RWA
        </button>
        <button id="tab-tw_stocks" onclick="switchTab('tw_stocks')" class="py-3 px-4 font-bold text-center border-b-2 text-sm transition-all rounded-t-lg">
            💻 台股與經濟部政策
        </button>
    </div>

    <!-- 卡片容器 -->
    <div id="news-container" class="space-y-6"></div>

    <!-- 🤖 AI 機器人懸浮按鈕與聊天視窗 -->
    <div id="ai-chat-widget" class="fixed bottom-6 right-6 z-50">
        <!-- 聊天視窗主體 (預設隱藏 hidden) -->
        <div id="chat-box" class="hidden mb-3 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col transition-all duration-300">
            <!-- 標題列 -->
            <div class="bg-slate-900 text-white px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-xl">🤖</span>
                    <div>
                        <h3 class="font-bold text-sm">Agentic RWA 助手</h3>
                        <p class="text-xs text-slate-400">已連線至 Colab 總經引擎</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-slate-400 hover:text-white text-lg font-bold">&times;</button>
            </div>

            <!-- 對話內容區 -->
            <div id="chat-messages" class="p-4 h-64 overflow-y-auto text-sm space-y-3 bg-slate-50">
                <div class="flex items-start">
                    <div class="bg-indigo-600 text-white rounded-xl rounded-tl-none px-3 py-2 max-w-[85%] shadow-sm">
                        哈囉！我是您的總經與 RWA 智能助理。目前的 VIX 指數與市場訊號已同步完成，請問有什麼我可以協助分析的嗎？
                    </div>
                </div>
            </div>

            <!-- 輸入框區 -->
            <div class="p-3 bg-white border-t border-slate-100 flex items-center space-x-2">
                <input type="text" id="chat-input" placeholder="輸入您的問題..." class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" onkeypress="handleKeyPress(event)">
                <button onclick="sendChatMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">傳送</button>
            </div>
        </div>

        <!-- 右下角浮動按鈕 -->
        <button onclick="toggleChat()" class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition-transform hover:scale-105 focus:outline-none shadow-indigo-200">
            🤖
        </button>
    </div>

    <script>
        let marketData = {};
        let activeTab = "us_macro";
        let currentLang = "zh";

        // 靜態 UI 翻譯字典
        const translations = {
            zh: {
                title: "每日總經與台美股跨市場連動歸因看板",
                total: "當前分區情報總數",
                bullish: "多頭 (Bullish) 訊號",
                vix: "🔥 VIX 恐慌避險追蹤",
                rwa: "📊 Agentic RWA 淨流向",
                tab_us: "🇺🇸 美股總經與 Fed 決策",
                tab_web3: "🌐 Web3 智能金融與 RWA",
                tab_tw: "💻 台股與經濟部政策",
                macro_title: "🌐 總體經濟與加密週期歸因",
                spillover_title: "💻 跨市場資金流向與溢出影響",
                rec_tw: "🟢 建議關注台股族群",
                rec_us: "🟢 建議關注美股標的",
                risk_tw: "🔴 高風險台股警告",
                risk_us: "🔴 高風險美股警告"
            },
            en: {
                title: "Macro Attribution & Cross-Market Dashboard",
                total: "Active Intelligence Count",
                bullish: "Bullish Signals Ratio",
                vix: "🔥 VIX Volatility Tracking",
                rwa: "📊 Agentic RWA Net Flows",
                tab_us: "🇺🇸 US Macro & Fed Policy",
                tab_web3: "🌐 Web3 Finance & RWA Node",
                tab_tw: "💻 TW Market & Policy Driver",
                macro_title: "🌐 Macro & Crypto Cycle Attribution",
                spillover_title: "💻 Cross-Market Capital Spillover",
                rec_tw: "🟢 Recommended TW Sectors",
                rec_us: "🟢 Recommended US Equities",
                risk_tw: "🔴 High-Risk TW Sectors",
                risk_us: "🔴 High-Risk US Equities"
            }
        };

        function changeLang(lang) {
            currentLang = lang;
            const isZh = lang === 'zh';
            
            document.getElementById('lang-zh').className = `px-3 py-1.5 rounded-lg transition-all ${isZh ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`;
            document.getElementById('lang-en').className = `px-3 py-1.5 rounded-lg transition-all ${!isZh ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`;
            
            const t = translations[lang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-meta-total').innerText = t.total;
            document.getElementById('ui-meta-bullish').innerText = t.bullish;
            document.getElementById('ui-meta-vix').innerText = t.vix;
            document.getElementById('ui-meta-rwa').innerText = t.rwa;
            document.getElementById('tab-us_macro').innerText = t.tab_us;
            document.getElementById('tab-web3_crypto').innerText = t.tab_web3;
            document.getElementById('tab-tw_stocks').innerText = t.tab_tw;

            renderActiveTab();
        }

        function switchTab(tabKey) {
            activeTab = tabKey;
            renderActiveTab();
        }

        function renderActiveTab() {
            ["us_macro", "web3_crypto", "tw_stocks"].forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (!btn) return;
                if (key === activeTab) {
                    btn.className = "py-3 px-4 font-bold text-center border-b-2 text-indigo-600 border-indigo-600 bg-white rounded-t-lg text-sm transition-all shadow-sm";
                } else {
                    btn.className = "py-3 px-4 font-bold text-center border-b-2 border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-all text-sm";
                }
            });

            let rawData = marketData[activeTab];
            if (!rawData && Array.isArray(marketData)) {
                rawData = marketData;
            }
            rawData = rawData || [];

            const vixData = marketData.global_vix || {};
            const t = translations[currentLang];

            document.getElementById('meta-total-val').innerText = rawData.length;
            const bullishCount = rawData.filter(n => n.ai_sentiment === 'Bullish').length;
            document.getElementById('meta-bullish-val').innerText = rawData.length ? Math.round((bullishCount / rawData.length) * 100) + '%' : '0%';
            
            document.getElementById('meta-vix-val').innerText = currentLang === 'zh' 
                ? `${vixData.value || '22.4'} (${vixData.status_zh || '避險情緒強烈'})`
                : `${vixData.value || '22.4'} (${vixData.status_en || 'Risk-Off'})`;
                
            document.getElementById('meta-vix-desc').innerText = currentLang === 'zh'
                ? (vixData.insight_zh || '【VIX 跨境聯動歸因】VIX 恐慌指數維持高位，反映宏觀資金正全面買入波動率期權進行下行保護。')
                : (vixData.insight_en || '【VIX Cross-Market Insight】VIX remains elevated, signaling widespread institutional hedging.');

            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if (rawData.length === 0) {
                container.innerHTML = `<div class="text-slate-400 text-center py-8">No active intelligence in this sector.</div>`;
                return;
            }

            rawData.forEach((news, index) => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-slate-200 rounded-xl p-5 hover:border-indigo-300 hover:shadow-lg transition-all shadow-sm';
                
                let recTwHtml = ''; (news.recommended_groups_tw || []).forEach(g => { recTwHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let riskTwHtml = ''; (news.high_risk_groups_tw || []).forEach(g => { riskTwHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let recUsHtml = ''; (news.recommended_groups_us || []).forEach(g => { recUsHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });
                let riskUsHtml = ''; (news.high_risk_groups_us || []).forEach(g => { riskUsHtml += `<div class="mb-1 text-xs text-slate-800"><b>· ${g.name}</b> <span class="text-slate-500">(${g.reason})</span></div>`; });

                const displayTitle = news.title || "Fed 紀要釋放 'Higher for Longer' 訊號";
                const displayMacro = news.macro_attribution || news.summary || "無詳細歸因數據";
                const displaySpillover = news.tw_spillover_effect || news.recommendation || "持平觀望";

                card.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-3 text-xs">
                        <div class="flex items-center gap-3">
                            <span class="px-2 py-0.5 rounded-full font-mono font-bold bg-slate-100 text-slate-700">${news.ai_sentiment || 'Mixed'}</span>
                            <span class="text-slate-500 font-mono">Volatility: <b class="text-amber-600">${news.vol_multiplier || '1.0x'}</b></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-slate-500 font-mono">Source: <b class="text-indigo-600">${news.source || 'RAG Node'}</b></span>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-slate-900 mb-4 border-l-4 border-indigo-500 pl-2.5">TOP ${index + 1} · ${displayTitle}</h3>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 pt-3.5 border-t border-slate-100 mb-4">
                        <div>
                            <div class="text-[11px] font-bold text-slate-400 tracking-wider uppercase mb-1.5">${t.macro_title}</div>
                            <p class="text-xs text-slate-600 leading-relaxed">${displayMacro}</p>
                        </div>
                        <div class="lg:border-l lg:border-slate-100 lg:pl-5">
                            <div class="text-[11px] font-bold text-indigo-600 tracking-wider uppercase mb-1.5">${t.spillover_title}</div>
                            <p class="text-xs text-slate-600 leading-relaxed font-medium">${displaySpillover}</p>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 mb-4 font-mono text-[11px]">
                        <div class="mb-1"><span class="text-amber-700 font-bold">📊 RWA On-Chain Metric:</span> <span class="text-slate-600 ml-1">${news.rwa_flow_metric || '+$45.8M Pool Inflow'}</span></div>
                        <div><span class="text-emerald-700 font-bold">🤖 Agent Execution Log:</span> <span class="text-slate-600 ml-1">${news.agent_action_log || '[SYSTEM] Nodes Balanced.'}</span></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                        <div class="bg-emerald-50/40 border border-emerald-100 rounded-xl p-4 space-y-2">
                            <div class="text-[11px] font-bold text-emerald-700 tracking-wider uppercase">${t.rec_tw}</div>
                            <div>${recTwHtml || '微星、技嘉、華城 (政策利多與硬體升級剛需)'}</div>
                            <div class="border-t border-emerald-100 my-2 pt-2 text-[11px] font-bold text-emerald-700 tracking-wider uppercase">${t.rec_us}</div>
                            <div>${recUsHtml || 'Microsoft (MSFT), NextEra Energy (NEE)'}</div>
                        </div>

                        <div class="bg-rose-50/40 border border-rose-100 rounded-xl p-4 space-y-2">
                            <div class="text-[11px] font-bold text-rose-700 tracking-wider uppercase">${t.risk_tw}</div>
                            <div>${riskTwHtml || '缺乏實質營收與高負債比之中小型生技、投機電子股'}</div>
                            <div class="border-t border-rose-100 my-2 pt-2 text-[11px] font-bold text-rose-700 tracking-wider uppercase">${t.risk_us}</div>
                            <div>${riskUsHtml || '高估值、無獲利撐腰之投機型 AI 概念股'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateDashboard() {
            try {
                const res = await fetch('dashboard_data.json');
                if (!res.ok) throw new Error("Fetch Error");
                marketData = await res.json();
                
                // 背景同步至 Colab 伺服器
                fetch('https://lovely-lights-stand.loca.lt/api/v1/update-macro-context', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true'
                    },
                    body: JSON.stringify({
                        vix_index: marketData.vix_index || 15.4,
                        fed_rate_cut_prob: marketData.fed_rate_cut_prob || 75.0,
                        sentiment_score: marketData.sentiment_score || 68,
                        market_regime: marketData.market_regime || "軟著陸降息循環"
                    })
                })
                .then(response => response.json())
                .then(result => console.log("🔥 【連線成功】後端 AI 回應：", result))
                .catch(error => console.error("❌ 【連線失敗】錯誤原因：", error));

                changeLang("zh");
            } catch (error) {
                console.error("載入失敗:", error);
                changeLang("zh");
            }
        }

        // 🤖 聊天互動視窗相關邏輯
        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.classList.toggle('hidden');
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msgContainer = document.getElementById('chat-messages');
            const text = input.value.trim();
            
            if (!text) return;

            // 顯示使用者訊息
            msgContainer.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-slate-800 text-white rounded-xl rounded-tr-none px-3 py-2 max-w-[85%] shadow-sm">
                        ${text}
                    </div>
                </div>
            `;
            input.value = '';
            msgContainer.scrollTop = msgContainer.scrollHeight;

            // 模擬 AI 智慧回應（可自動讀取看板上的 VIX 數值）
            setTimeout(() => {
                const vixVal = marketData.global_vix ? marketData.global_vix.value : '22.4';
                msgContainer.innerHTML += `
                    <div class="flex items-start space-x-2">
                        <div class="bg-indigo-600 text-white rounded-xl rounded-tl-none px-3 py-2 max-w-[85%] shadow-sm">
                            收到您的指令！目前看板的 VIX 恐慌指數為 ${vixVal}，智能代理正持續為您監控跨市場流動性與 RWA 節點。
                        </div>
                    </div>
                `;
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }, 600);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        }

        updateDashboard();
    </script>
</body>
</html>
