<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .card-bright { background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">🎯 每日總經與台美股跨市場連動歸因看板</h1>
        <div id="content" class="space-y-6">讀取中...</div>
    </div>

    <script>
        async function updateDashboard() {
            const res = await fetch('dashboard_data.json');
            const data = await res.json();
            const container = document.getElementById('content');
            
            // 渲染邏輯，直接對接您 Python 引擎的結構
            container.innerHTML = data.us_macro.map(item => `
                <div class="card-bright p-8 border-l-4 border-indigo-500">
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">${item.title_zh}</h2>
                    <div class="grid grid-cols-2 gap-10 text-sm">
                        <div class="text-slate-600">
                            <div class="text-indigo-600 font-bold mb-2 uppercase text-xs">總經歸因</div>
                            <p>${item.macro_attribution_zh}</p>
                        </div>
                        <div class="bg-red-50 p-4 rounded">
                            <div class="text-red-700 font-bold mb-2 uppercase text-xs">風險與推薦指標</div>
                            <p class="text-slate-700">${item.risk_attribution_zh || '無資料'}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        updateDashboard();
    </script>
</body>
</html>
