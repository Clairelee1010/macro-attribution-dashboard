<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Macro Dashboard v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
        .tab-btn { color: #64748b; cursor: pointer; padding-bottom: 0.5rem; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #4f46e5; border-bottom: 2px solid #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="p-8">

<div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🎯 每日總經與台美股跨市場連動歸因看板</h1>
    
    <!-- 頁籤 -->
    <div class="flex space-x-8 border-b border-slate-200 mb-8">
        <div class="tab-btn active" onclick="render('us')">美股總經與 Fed 決策情報</div>
        <div class="tab-btn" onclick="render('web3')">Web3 智能金融</div>
        <div class="tab-btn" onclick="render('tw')">台股與政策動態</div>
    </div>

    <!-- 新聞容器 (這裡會自動渲染多筆) -->
    <div id="news-list" class="space-y-6"></div>
</div>

<script>
    // 這裡使用陣列，這就是為什麼原本可以顯示多筆新聞的關鍵
    const db = {
        us: [
            { title: "Fed 紀要釋放 'Higher for Longer' 訊號", source: "Reuters / FOMC Minutes", macro: "強烈鷹派訊號，核心通膨黏性導致殖利率飆升。", spillover: "台美利差擴大，引發權值股提款壓力。" },
            { title: "美債殖利率曲線倒掛持續", source: "Bloomberg", macro: "長短債利差持續收斂，反映市場對衰退擔憂。", spillover: "對高股息科技股估值產生修正壓力。" }
        ],
        web3: [
            { title: "RWA 鏈上資金流入健康", source: "Agentic Finance", macro: "鏈上流動性穩定，機構資金持續佈局。", spillover: "對半導體散熱模組需求間接提升。" }
        ],
        tw: [
            { title: "台股技術面支撐強勁", source: "Economic Ministry", macro: "先進製程產能滿載，帶動出口動能。", spillover: "外資持續買超重點權值股。" }
        ]
    };

    function render(key) {
        // 更新按鈕狀態
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', (key === 'us' && idx === 0) || (key === 'web3' && idx === 1) || (key === 'tw' && idx === 2));
        });

        const list = document.getElementById('news-list');
        list.innerHTML = ""; // 清空

        // 核心：這裡用 forEach 確保有多少資料就顯示多少
        db[key].forEach(item => {
            list.innerHTML += `
                <div class="card p-6 shadow-sm">
                    <h3 class="text-xl font-bold text-indigo-700">${item.title}</h3>
                    <p class="text-sm text-slate-400 mb-4">${item.source}</p>
                    <div class="grid grid-cols-2 gap-8 text-sm">
                        <div><p class="font-bold text-slate-500 uppercase">總經歸因</p><p>${item.macro}</p></div>
                        <div><p class="font-bold text-slate-500 uppercase">台股溢出</p><p>${item.spillover}</p></div>
                    </div>
                </div>
            `;
        });
    }

    render('us'); // 初始化
</script>
</body>
</html>
