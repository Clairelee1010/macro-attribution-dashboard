name: Daily Data Update

on:
  schedule:
    - cron: '0 1 * * *' # 每天 UTC 01:00（台灣時間早上 9 點）自動執行
  workflow_dispatch: # 支援在 GitHub 介面上手動一鍵觸發
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'data.json' # 重要：防止 Commit data.json 後再次觸發此 Workflow 造成無限迴圈

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run RAG pipeline script
        env:
          # 如果你的 rag_pipeline.py 需要 API Key，請確保已在 GitHub Repo Settings > Secrets 加入，並在此引用：
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python rag_pipeline.py

      - name: Auto Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update dashboard data.json via RAG Pipeline [skip ci]"
          file_pattern: data.json
          git_user_name: "github-actions[bot]"
          git_user_email: "github-actions[bot]@users.noreply.github.com"
