name: Daily Data Update
on:
  schedule:
    - cron: '0 1 * * *'  # 每天早上 9 點 (UTC+8) 執行
  workflow_dispatch:      # 讓你可以在網頁上手動按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run update script
        run: python update_data.py # 執行你那份 Python 腳本

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Update dashboard data automatically"
          git push
