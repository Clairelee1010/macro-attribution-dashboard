name: Daily Data Update

on:
  schedule:
    - cron: '0 1 * * *' # 每天 UTC 01:00（台灣時間早上 9 點）自動執行
  workflow_dispatch: # 支援在 GitHub 介面上手動一鍵觸發
  push:
    branches: [ "main" ] # 每次更新或 Commit 程式碼時自動執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run RAG pipeline script
        run: python rag_pipeline.py

      - name: Auto Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update dashboard data.json via RAG Pipeline"
          file_pattern: data.json
          git_user_name: "github-actions[bot]"
          git_user_email: "github-actions[bot]@users.noreply.github.com"
